name: Deploy Next.js to EC2

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-to-ec2
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Node.js 환경 설정
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 'lts/*'
          cache: 'npm'

      # 3. 의존성 설치
      - name: Install dependencies
        run: npm ci

      # 4. 환경변수 파일 생성
      - name: Create .env.local file
        run: |
          echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" > .env.local

      # 5. 빌드 실행
      - name: Build application
        run: npm run build

      # 6. SSH 키 설정
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      # 7. 빌드 결과물 전송 (node_modules 제외)
      - name: Deploy to EC2
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.next/cache' \
            --exclude='.next/types' \
            --exclude='node_modules' \
            --no-perms --no-owner --no-group \
            --chmod=D755,F644 \
            .next \
            package.json \
            package-lock.json \
            next.config.js \
            public \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ubuntu/chalpu-web/

      # 8. EC2에서 서비스 재시작
      - name: Restart application on EC2
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            cd /home/ubuntu/chalpu-web
            
            # 기존 프로세스 완전 정리
            pm2 delete chalpu-web || true
            sudo pkill -f "chalpu-web" || true
            sudo fuser -k 3001/tcp || true
            
            # 프로덕션 의존성만 설치
            npm ci --only=production
            
            # 새로운 프로세스 시작
            pm2 start npm --name chalpu-web -- run start -- -p 3001
            pm2 save
            
            # nginx 재시작
            sudo systemctl reload nginx
          EOF
