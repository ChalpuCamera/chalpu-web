name: Deploy to EC2 on main push

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Move to project directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/chalpu-web
            pwd
            echo "✅ Moved to project directory"

      - name: 2. Pull latest code
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/chalpu-web
            git pull
            echo "✅ Git pull completed"

      - name: 3. Clean up existing processes
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/chalpu-web
            if pm2 list | grep -q "chalpu-web"; then
              pm2 delete chalpu-web
              echo "✅ PM2 process deleted"
            else
              echo "ℹ️ No existing PM2 process found"
            fi
            pkill -f "npm ci" || true
            echo "✅ Process cleanup completed"

      - name: 4. Install dependencies
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/chalpu-web
            echo "📦 Installing dependencies..."
            npm ci
            echo "✅ Dependencies installed"

      - name: 5. Build application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/chalpu-web
            echo "🔨 Building application..."
            npm run build
            echo "✅ Build completed"

      - name: 6. Start PM2 process
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/chalpu-web
            echo "🚀 Starting PM2 process..."
            pm2 start npm --name chalpu-web -- run start -- -p 3001
            pm2 save
            echo "✅ PM2 process started and saved"

      - name: 7. Restart nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "🔄 Restarting nginx..."
            sudo systemctl restart nginx
            echo "✅ Nginx restarted"

      - name: 8. Post-deployment cleanup
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/chalpu-web
            echo "🧹 Cleaning up..."
            npm cache clean --force
            pkill -f "npm ci" || true
            echo "✅ Cleanup completed"
            echo "🎉 Deployment finished successfully!"
